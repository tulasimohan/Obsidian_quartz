name: Deploy to GitHub Pages

on:
  push:
    branches:
      - v4 # Or 'main' if that's your primary branch
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use a Node.js version compatible with your project

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz site
        run: npx quartz build

      - name: Copy assets to public
        run: cp -r assets/ public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages # The branch GitHub Pages will serve from
          force_orphan: true # Creates a fresh gh-pages branch each time
